---
networks:
  pa_mcp_network:
    driver: bridge

volumes:
  open-webui:
    driver: local

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - pa_mcp_network
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
    volumes:
      - open-webui:/app/backend/data

  pa_mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: pa-mcp:local
    container_name: pa_mcp
    restart: unless-stopped
    ports:
      - "${MCPO_PORT:-8000}:8000"
    networks:
      - pa_mcp_network
    environment:
      MCPO_API_KEY: ${MCPO_API_KEY:?MCPO_API_KEY must be set}
      PANOS_HOST: ${PA_HOST:?PA_HOST must be set}
      PANOS_API_KEY: ${PA_TOKEN:?PA_TOKEN must be set}
      PANOS_PROXY: ${PANOS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      no_proxy: ${NO_PROXY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
